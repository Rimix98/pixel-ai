<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone | Pixel Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --surface-color: #282828;
            --surface-hover: #3f3f3f;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #ff0000;
            --glass: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .menu-btn:hover {
            background: var(--surface-hover);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: var(--accent-color);
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .header-center {
            flex: 0 1 720px;
            display: flex;
            gap: 12px;
        }

        .search-container {
            display: flex;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 8px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: #1c6bf6;
        }

        .search-btn {
            background: var(--surface-color);
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            padding: 0 20px;
            cursor: pointer;
            color: white;
            transition: var(--transition);
        }

        .search-btn:hover {
            background: var(--surface-hover);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--surface-hover);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        /* --- Sidebar --- */
        aside {
            position: fixed;
            top: 56px;
            left: 0;
            width: 240px;
            height: calc(100vh - 56px);
            padding: 12px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .nav-group {
            margin-bottom: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: var(--surface-hover);
        }

        .nav-item.active {
            background: var(--surface-hover);
            font-weight: 500;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .separator {
            height: 1px;
            background: #303030;
            margin: 12px 0;
        }

        /* --- Main Content --- */
        main {
            margin-top: 56px;
            margin-left: 240px;
            padding: 24px;
        }

        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
        }

        .category-chip {
            background: var(--surface-color);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .category-chip:hover {
            background: var(--surface-hover);
        }

        .category-chip.active {
            background: white;
            color: black;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            cursor: pointer;
            transition: var(--transition);
        }

        .thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #202020;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .video-card:hover .thumbnail img {
            transform: scale(1.05);
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 500;
        }

        .video-info {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .details h3 {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .details p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.2;
        }

        /* --- Responsive --- */
        @media (max-width: 1200px) {
            aside {
                width: 72px;
            }
            aside .nav-item span {
                display: none;
            }
            aside .nav-item {
                justify-content: center;
                padding: 12px 0;
            }
            main {
                margin-left: 72px;
            }
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }
            main {
                margin-left: 0;
            }
            .header-center {
                flex: 1;
            }
            .search-input {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M10 15l5.19-3.11-5.19-3.11V15z"/><path d="M0 12C0 6.48 6.48 0 12 0s12 6.48 12 12-6.48 12-12 12S0 17.52 0 12z"/><path d="M17 17h-10v-2h10v2z"/></svg>
                </div>
                <span>YouTube</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Введите запрос">
                <button class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="header-right">
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.8 12h5.2"></path></svg>
            </button>
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12L2 12"></path><path d="M12 12v10"></path></svg>
            </button>
            <img src="https://i.pravatar.cc/150?u=roma" class="user-avatar" alt="User">
        </div>
    </header>

    <aside>
        <div class="nav-group">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 2 2 12h3v8z"/></svg>
                <span>Главная</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M12 18V12"></path><path d="M12 12L9 15"></path><path d="M12 12l3 3"></path></svg>
                <span>Shorts</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-9-9 9 9 0 0 1 9-9 9 9 0 0 1 9 9z"></path><path d="M12 7v5"></path><path d="M12 12h5"></path></svg>
                <span>Подписки</span>
            </a>
        </div>

        <div class="separator"></div>

        <div class="nav-group">
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 12 12 12 22"></polyline></svg>
                <span>Библиотека</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"></path><path d="M12 7v10"></path><path d="M7 12h10"></path></svg>
                <span>История</span>
            </a>
        </div>
    </aside>

    <main>
        <div class="categories">
            <div class="category-chip active">Все</div>
            <div class="category-chip">Программирование</div>
            <div class="category-chip">Дизайн</div>
            <div class="category-chip">Музыка</div>
            <div class="category-chip">Игры</div>
            <div class="category-chip">Новости</div>
            <div class="category-chip">Спорт</div>
            <div class="category-chip">Живые стримы</div>
            <div class="category-chip">Технологии</div>
        </div>

        <div class="video-grid" id="videoGrid">
            <!-- JS will populate this -->
        </div>
    </main>

    <script>
        const videoData = [
            {
                title: "Как создать современный сайт на 2024 год",
                channel: "Pixel Dev",
                views: "1.2 млн просмотров",
                time: "2 дня назад",
                duration: "15:20",
                thumb: "https://picsum.photos/seed/web/400/225",
                avatar: "https://i.pravatar.cc/150?u=1"
            },
            {
                title: "Разбор архитектуры больших систем",
                channel: "System Design Pro",
                views: "450 тыс. просмотров",
                time: "1 неделю назад",
                duration: "42:10",
                thumb: "https://picsum.photos/seed/arch/400/225",
                avatar: "https://i.pravatar.cc/150?u=2"
            },
            {
                title: "10 советов по продуктивности для программиста",
                channel: "Code Life",
                views: "89к просмотров",
                time: "5 часов назад",
                duration: "10:05",
                thumb: "https://picsum.photos/seed/prod/400/225",
                avatar: "https://i.pravatar.cc/150?u=3"
            },
            {
                title: "Почему Rust становится популярным?",
                channel: "Tech Talk",
                views: "2.1 млн просмотров",
                time: "1 месяц назад",
                duration: "18:45",
                thumb: "https://picsum.photos/seed/rust/400/225",
                avatar: "https://i.pravatar.cc/150?u=4"
            },
            {
                title: "Путешествие в Токио: 4K Cinematic",
                channel: "Travel World",
                views: "10 млн просмотров",
                time: "3 месяца назад",
                duration: "22:30",
                thumb: "https://picsum.photos/seed/tokyo/400/225",
                avatar: "https://i.pravatar.cc/150?u=5"
            },
            {
                title: "Создаем AI-ассистента с нуля",
                channel: "AI Academy",
                views: "300 тыс. просмотров",
                time: "4 дня назад",
                duration: "31:12",
                thumb: "https://picsum.photos/seed/ai/400/225",
                avatar: "https://i.pravatar.cc/150?u=6"
            },
            {
                title: "Секреты типографики в веб-дизайне",
                channel: "Design Master",
                views: "120к просмотров",
                time: "2 недели назад",
                duration: "12:00",
                thumb: "https://picsum.photos/seed/type/400/225",
                avatar: "https://i.pravatar.cc/150?u=7"
            },
            {
                title: "Как работает блокчейн простыми словами",
                channel: "Crypto Basics",
                views: "600 тыс. просмотров",
                time: "1 год назад",
                duration: "14:50",
                thumb: "https://picsum.photos/seed/chain/400/225",
                avatar: "https://i.pravatar.cc/150?u=8"
            }
        ];

        const grid = document.getElementById('videoGrid');

        videoData.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumbnail">
                    <img src="${video.thumb}" alt="thumbnail">
                    <div class="duration">${video.duration}</div>
                </div>
                <div class="video-info">
                    <img src="${video.avatar}" class="channel-avatar">
                    <div class="details">
                        <h3>${video.title}</h3>
                        <p>${video.channel}</p>
                        <p>${video.views} • ${video.time}</p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
